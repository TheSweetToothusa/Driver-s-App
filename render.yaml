databases:
  - name: sweettooth-db
    plan: starter
    databaseName: sweettooth
    user: sweettooth

services:
  - type: web
    name: driver-s-app
    env: node
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sweettooth-db
          property: connectionString
      - key: SHOPIFY_STORE_URL
        sync: false
      - key: SHOPIFY_ACCESS_TOKEN
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: KATIE_PHONE
        sync: false
